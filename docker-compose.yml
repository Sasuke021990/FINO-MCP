services:
  finology-mcp:
    build: .
    # Stdio must be mapped properly if using standard docker run
    # For a service running persistently, usually MCP is launched via command line.
    # We include a compose file primarily to easily mount the volume if needed for testing.
    volumes:
      - ./screenshots:/app/screenshots
      - ./financials.db:/app/financials.db
    # Make sure stdio is accessible (required for MCP stdio transport)
    stdin_open: true
    tty: true
    # Host networking avoids all Docker bridge/NAT edge cases when reaching
    # Ollama's NodePort on the same TrueNAS box - the container shares the
    # host's network stack directly, so localhost really is the host's localhost.
    # The app's Express server binds directly to the host's port 8888 as a result.
    network_mode: host
    environment:
      - OLLAMA_HOST=http://127.0.0.1:30068
