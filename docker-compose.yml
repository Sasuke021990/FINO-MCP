services:
  finology-mcp:
    build: .
    # Stdio must be mapped properly if using standard docker run
    # For a service running persistently, usually MCP is launched via command line.
    # We include a compose file primarily to easily mount the volume if needed for testing.
    volumes:
      - ./screenshots:/app/screenshots
      - ./financials.db:/app/financials.db
    # Make sure stdio is accessible (required for MCP stdio transport)
    stdin_open: true
    tty: true
    # Host networking so the app's Express server binds directly to the
    # host's port 8888, avoiding Docker bridge/NAT edge cases.
    network_mode: host
    environment:
      # Base URL embedded in returned screenshot links - must be reachable by
      # whatever client (local or remote) calls this MCP server.
      - SCREENSHOT_BASE_URL=http://100.115.179.105:8888
